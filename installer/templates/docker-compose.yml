name: ploydok

services:
  api:
    image: ${PLOYDOK_IMAGE_REGISTRY}/ploydok-api:${PLOYDOK_VERSION}
    restart: unless-stopped
    labels:
      ploydok.kind: app
      ploydok.component: api
      com.centurylinklabs.watchtower.enable: "true"
    env_file: ${PLOYDOK_DATA_DIR}/.env
    depends_on:
      - postgres
      - redis
      - buildkitd
    volumes:
      - ${PLOYDOK_DATA_DIR}/logs:/var/log/ploydok
      - ${PLOYDOK_DATA_DIR}/builds:/var/lib/ploydok/builds
      - ${PLOYDOK_DATA_DIR}/static:/var/lib/ploydok/static
      - ${PLOYDOK_DATA_DIR}/certs:/var/lib/ploydok/certs:ro
      - ${PLOYDOK_DATA_DIR}/pki:/var/lib/ploydok/pki:ro
      - ${PLOYDOK_DATA_DIR}/agent:/run/ploydok
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:3335:3335"
    networks:
      - ploydok

  web:
    image: ${PLOYDOK_IMAGE_REGISTRY}/ploydok-web:${PLOYDOK_VERSION}
    restart: unless-stopped
    labels:
      ploydok.kind: app
      ploydok.component: web
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PLOYDOK_API_URL: http://api:3335
    depends_on:
      - api
    networks:
      - ploydok

  agent:
    image: ${PLOYDOK_IMAGE_REGISTRY}/ploydok-agent:${PLOYDOK_VERSION}
    restart: unless-stopped
    labels:
      ploydok.kind: app
      ploydok.component: agent
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PLOYDOK_AGENT_ADDR: 0.0.0.0:50051
      PLOYDOK_AGENT_PKI_DIR: /var/lib/ploydok/pki
      PLOYDOK_VALIDATOR_CONFIG: /etc/ploydok/validator.toml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PLOYDOK_DATA_DIR}/agent:/run/ploydok
      - ${PLOYDOK_DATA_DIR}/volumes:/var/lib/ploydok/volumes
      - ${PLOYDOK_DATA_DIR}/app-volumes:/var/lib/ploydok/app-volumes
      - ${PLOYDOK_DATA_DIR}/static:/var/lib/ploydok/static
      - ${PLOYDOK_DATA_DIR}/config:/etc/ploydok:ro
      - ${PLOYDOK_DATA_DIR}/pki:/var/lib/ploydok/pki:ro
    networks:
      - ploydok

  caddy:
    image: ${PLOYDOK_IMAGE_REGISTRY}/ploydok-caddy:${PLOYDOK_VERSION}
    restart: unless-stopped
    labels:
      ploydok.kind: infra
      ploydok.component: caddy
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      - ${PLOYDOK_INSTALL_DIR}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - ${PLOYDOK_DATA_DIR}/static:/var/lib/ploydok/static:ro
    ports:
      - "${PLOYDOK_HTTP_BIND}:80"
      - "${PLOYDOK_HTTPS_BIND}:443"
      - "127.0.0.1:2019:2019"
    networks:
      - ploydok
      - ploydok-public

  adminer:
    image: ${PLOYDOK_IMAGE_REGISTRY}/ploydok-adminer:${PLOYDOK_VERSION}
    restart: unless-stopped
    labels:
      ploydok.kind: infra
      ploydok.component: adminer
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - ploydok

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ploydok
      POSTGRES_PASSWORD: ${PLOYDOK_PG_PASSWORD}
      POSTGRES_DB: ploydok
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ploydok

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${PLOYDOK_REDIS_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    volumes:
      - redis-data:/data
    networks:
      - ploydok

  registry:
    image: registry:2
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - ploydok

  buildkitd:
    image: moby/buildkit:v0.29.0-rootless
    container_name: ploydok-buildkitd
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    user: "1000:1000"
    command:
      - --addr
      - tcp://0.0.0.0:1234
      - --oci-worker-no-process-sandbox
      - --config
      - /etc/buildkit/buildkitd.toml
    volumes:
      - buildkit-cache:/home/user/.local/share/buildkit
      - ${PLOYDOK_DATA_DIR}/config/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
    networks:
      - ploydok

networks:
  ploydok:
    driver: bridge
  ploydok-public:
    name: ploydok-public
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
  registry-data:
  buildkit-cache:
