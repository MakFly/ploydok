name: ploydok

networks:
  ploydok:
    driver: bridge
    external: false
  # Legacy flat network (pre-Phase-1.C). Still attached to BuildKit so image
  # pushes to the registry keep working.
  ploydok-public:
    external: true
  # Pre-Phase-1.D shared ingress. Kept external for the one-shot migration
  # script (`scripts/migrate-network-isolation.ts`) to detach lingering app
  # containers. New apps are NEVER attached here — each project owns its own
  # network and Caddy joins dynamically via the agent's NetworkConnect RPC.
  ploydok-ingress:
    external: true

volumes:
  buildkit-cache:
  registry-data:
  postgres-data:
  redis-data:

services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    labels:
      ploydok.kind: infra
      ploydok.service: caddy
    ports:
      - "8180:80"
      - "8543:443"
      - "127.0.0.1:2020:2019"
    volumes:
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      PLOYDOK_DOMAIN: ${PLOYDOK_DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ploydok
      - ploydok-public

  buildkitd:
    image: moby/buildkit:v0.29.0-rootless
    container_name: ploydok-buildkitd
    labels:
      ploydok.kind: infra
      ploydok.service: buildkitd
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    user: "1000:1000"
    command:
      - --addr
      - unix:///run/user/1000/buildkit/buildkitd.sock
      - --oci-worker-no-process-sandbox
      - --config
      - /etc/buildkit/buildkitd.toml
    volumes:
      - buildkit-cache:/home/user/.local/share/buildkit
      - ./buildkit:/etc/buildkit:ro
    networks:
      - ploydok
      - ploydok-public

  registry:
    image: registry:2
    labels:
      ploydok.kind: infra
      ploydok.service: registry
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
      - ./registry/config.yml:/etc/docker/registry/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ploydok

  postgres:
    image: postgres:16-alpine
    container_name: ploydok-postgres
    environment:
      POSTGRES_USER: ploydok
      POSTGRES_PASSWORD: ${PLOYDOK_PG_PASSWORD}
      POSTGRES_DB: ploydok
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ploydok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      ploydok.kind: infra
      ploydok.service: postgres
    networks:
      - ploydok

  redis:
    image: redis:7-alpine
    container_name: ploydok-redis
    command: ["redis-server", "--requirepass", "${PLOYDOK_REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${PLOYDOK_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    labels:
      ploydok.kind: infra
      ploydok.service: redis
    networks:
      - ploydok

  # TODO (Sprint 2.3): agent service — will be built from agent/ Dockerfile.
  # Uncomment and configure once the Rust agent binary and Dockerfile are ready.
  # agent:
