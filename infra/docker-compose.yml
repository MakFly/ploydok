name: ploydok

networks:
  ploydok:
    driver: bridge
    external: false
  # ploydok-public is created externally (by the agent or by CI setup) so that
  # agent-spawned app containers and Caddy can communicate over this shared network.
  ploydok-public:
    external: true

volumes:
  buildkit-cache:
  registry-data:

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8180:80"
      - "8543:443"
      - "127.0.0.1:2020:2019"
    volumes:
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      PLOYDOK_DOMAIN: ${PLOYDOK_DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ploydok
      - ploydok-public

  buildkitd:
    image: moby/buildkit:v0.13.2-rootless
    container_name: ploydok-buildkitd
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    user: "1000:1000"
    command:
      - --addr
      - unix:///run/user/1000/buildkit/buildkitd.sock
      - --oci-worker-no-process-sandbox
      - --config
      - /etc/buildkit/buildkitd.toml
    volumes:
      - buildkit-cache:/home/user/.local/share/buildkit
      - ./buildkit:/etc/buildkit:ro
    networks:
      - ploydok
      - ploydok-public

  registry:
    image: registry:2
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
      - ./registry/config.yml:/etc/docker/registry/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ploydok

