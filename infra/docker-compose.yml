name: ploydok

networks:
  ploydok:
    driver: bridge
    external: false
  # Legacy flat network (pre-Phase-1.C). Still attached to BuildKit so image
  # pushes to the registry keep working.
  ploydok-public:
    external: true
  # Pre-Phase-1.D shared ingress. Kept external for the one-shot migration
  # script (`scripts/migrate-network-isolation.ts`) to detach lingering app
  # containers. New apps are NEVER attached here — each project owns its own
  # network and Caddy joins dynamically via the agent's NetworkConnect RPC.
  ploydok-ingress:
    external: true

volumes:
  buildkit-cache:
  registry-data:
  postgres-data:
  redis-data:
  agent-target:
  agent-cargo-registry:

services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    labels:
      ploydok.kind: infra
      ploydok.service: caddy
    ports:
      - "8180:80"
      - "8543:443"
      - "16432-16532:16432-16532"
      - "127.0.0.1:2020:2019"
    volumes:
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      PLOYDOK_DOMAIN: ${PLOYDOK_DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ploydok
      - ploydok-public

  buildkitd:
    image: moby/buildkit:v0.29.0-rootless
    container_name: ploydok-buildkitd
    labels:
      ploydok.kind: infra
      ploydok.service: buildkitd
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    user: "1000:1000"
    command:
      - --addr
      - unix:///run/user/1000/buildkit/buildkitd.sock
      - --oci-worker-no-process-sandbox
      - --config
      - /etc/buildkit/buildkitd.toml
    volumes:
      - buildkit-cache:/home/user/.local/share/buildkit
      - ./buildkit:/etc/buildkit:ro
    networks:
      - ploydok
      - ploydok-public

  registry:
    image: registry:2
    labels:
      ploydok.kind: infra
      ploydok.service: registry
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
      - ./registry/config.yml:/etc/docker/registry/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ploydok

  postgres:
    image: postgres:16-alpine
    container_name: ploydok-postgres
    environment:
      POSTGRES_USER: ploydok
      POSTGRES_PASSWORD: ${PLOYDOK_PG_PASSWORD}
      POSTGRES_DB: ploydok
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ploydok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      ploydok.kind: infra
      ploydok.service: postgres
    networks:
      - ploydok

  redis:
    image: redis:7-alpine
    container_name: ploydok-redis
    command:
      [
        "redis-server",
        "--requirepass",
        "${PLOYDOK_REDIS_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${PLOYDOK_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    labels:
      ploydok.kind: infra
      ploydok.service: redis
    networks:
      - ploydok

  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    container_name: ploydok-agent
    restart: unless-stopped
    labels:
      ploydok.kind: agent
      ploydok.service: agent
    environment:
      PLOYDOK_AGENT_SOCKET: /run/ploydok/agent.sock
      PLOYDOK_AGENT_INSECURE: "1"
      PLOYDOK_VALIDATOR_CONFIG: /workspace/config/dev-validator.toml
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ../agent:/workspace
      - ../packages/agent-proto:/packages/agent-proto:ro
      - agent-target:/workspace/target
      - agent-cargo-registry:/usr/local/cargo/registry
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/ploydok:/run/ploydok
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/ploydok/agent.sock"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 120s
    # Limits dimensionnées pour le DEV : cargo-watch rebuild en release mode
    # peut peaker à ~1.5 GB pendant le link/codegen. Le binaire à l'arrêt
    # consomme ~30-60 MB. En prod (binaire pré-buildé sans cargo dans l'image),
    # 256 MB / 0.5 CPU suffisent largement.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - ploydok
      - ploydok-public
