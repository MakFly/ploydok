// SPDX-License-Identifier: AGPL-3.0-only
//
// Source of truth for the ploydok-agent gRPC API.
// TS generated code: packages/agent-proto/src/gen/
// Rust generated code: agent/crates/ploydok-proto/src/ (via tonic-build)

syntax = "proto3";

package ploydok.agent.v1;

// ─────────────────────────────────────────────────────────────────────────────
// Shared structures
// ─────────────────────────────────────────────────────────────────────────────

// Volume mount binding.
message VolumeMount {
  string host_path = 1;
  string container_path = 2;
  bool   read_only = 3;
}

// Port mapping.
message PortMapping {
  uint32 container_port = 1;
  uint32 host_port = 2;
  // "tcp" or "udp" — defaults to "tcp" if empty
  string proto = 3;
}

// CPU / memory / pids limits. Zero values mean "no limit".
message ResourceLimits {
  // Fractional CPUs, e.g. 0.5 = 50 % of one core
  double cpu = 1;
  // Memory limit in bytes
  int64  memory_bytes = 2;
  // Maximum number of PIDs (processes+threads) the container may spawn
  int64  pids_limit = 3;
}

// Docker container healthcheck.
message HealthcheckConfig {
  // Possible values mirror Docker:
  // - [] inherit from image
  // - ["NONE"] disable
  // - ["CMD", args...]
  // - ["CMD-SHELL", command]
  repeated string test = 1;
  int64 interval_seconds = 2;
  int64 timeout_seconds = 3;
  uint32 retries = 4;
  int64 start_period_seconds = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// ContainerCreate
// ─────────────────────────────────────────────────────────────────────────────

message ContainerCreateRequest {
  // Container name — MUST match the ploydok-* allowlist enforced by the agent.
  string name = 1;

  // Docker image reference (e.g. "nginx:1.25-alpine").
  string image = 2;

  // Environment variables. Keys must not start with PLOYDOK_INTERNAL_.
  map<string, string> env = 3;

  // Labels applied to the container.
  map<string, string> labels = 4;

  // DEPRECATED: use `networks` below. Kept for backward compat.
  // When `networks` is non-empty it takes precedence and this field is ignored.
  string network = 5;

  // Volume mounts. host_path must be under /var/lib/ploydok/volumes/.
  repeated VolumeMount volumes = 6;

  // Port mappings.
  repeated PortMapping ports = 7;

  // Restart policy: "", "no", "always", "unless-stopped", "on-failure".
  string restart_policy = 8;

  // Resource limits applied to the container.
  ResourceLimits resource_limits = 9;

  // Override the image entrypoint/command.
  repeated string command = 10;

  // Run the container process as this user (e.g. "1000:1000").
  string user = 11;

  // Docker networks to attach the container to (each must be pre-created via NetworkCreate).
  // When non-empty this supersedes the deprecated `network` field above.
  repeated string networks = 12;

  // Optional Docker healthcheck.
  optional HealthcheckConfig healthcheck = 13;
}

message ContainerCreateResponse {
  string container_id = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// ContainerStart / Stop / Remove
// ─────────────────────────────────────────────────────────────────────────────

message ContainerStartRequest {
  string container_id = 1;
}

message ContainerStartResponse {}

message ContainerStopRequest {
  string container_id = 1;
  // Seconds to wait before SIGKILL. 0 → use Docker default (10s).
  uint32 timeout_seconds = 2;
}

message ContainerStopResponse {}

message ContainerRemoveRequest {
  string container_id = 1;
  // Remove the container even if running.
  bool force = 2;
  // Remove anonymous volumes attached to the container.
  bool remove_volumes = 3;
}

message ContainerRemoveResponse {}

// ─────────────────────────────────────────────────────────────────────────────
// ContainerLogs (server-side streaming)
// ─────────────────────────────────────────────────────────────────────────────

message ContainerLogsRequest {
  string container_id = 1;
  // Stream new lines (tail -f behaviour).
  bool follow = 2;
  // Return logs since this Unix timestamp (0 = no lower bound).
  int64 since_unix = 3;
  // Maximum number of lines to return from the tail. 0 = all.
  uint32 tail = 4;
}

message LogLine {
  // "stdout" or "stderr"
  string stream = 1;
  string line = 2;
  // Timestamp from Docker log driver (RFC 3339 with nano precision).
  string timestamp = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// ContainerStats (server-side streaming)
// ─────────────────────────────────────────────────────────────────────────────

message ContainerStatsRequest {
  string container_id = 1;
  // Stream stats continuously (like `docker stats`). False → single snapshot.
  bool stream = 2;
}

message StatsFrame {
  string container_id = 1;
  // Unix timestamp (nanoseconds) of the sample.
  int64 timestamp_ns = 2;
  // CPU usage, normalised to [0.0, num_cpus].
  double cpu_percent = 3;
  // Resident memory in bytes.
  int64 memory_bytes = 4;
  // Memory limit in bytes.
  int64 memory_limit_bytes = 5;
  // Network bytes received since container start.
  int64 net_rx_bytes = 6;
  // Network bytes transmitted since container start.
  int64 net_tx_bytes = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// ImagePull (server-side streaming)
// ─────────────────────────────────────────────────────────────────────────────

// Registry authentication for private image pulls.
message RegistryAuth {
  string username = 1;
  string password = 2;
}

message ImagePullRequest {
  // Full image reference including tag (e.g. "nginx:1.25-alpine").
  string image = 1;
  // Optional registry credentials. Omit for anonymous pulls.
  RegistryAuth registry_auth = 2;
}

message PullProgress {
  string status = 1;
  string layer_id = 2;
  int64 current = 3;
  int64 total = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// ImageBuild (server-side streaming)
// ─────────────────────────────────────────────────────────────────────────────

message ImageBuildRequest {
  // Tag to apply to the resulting image.
  string tag = 1;
  // Dockerfile content (UTF-8).
  bytes dockerfile = 2;
  // Build context files: path → content.
  map<string, bytes> context = 3;
  // Build-time ARGs.
  map<string, string> build_args = 4;
}

message BuildProgress {
  // Raw JSON stream line from Docker build output.
  string stream = 1;
  // Non-empty when the build step emits an error.
  string error = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// NetworkCreate / Remove
// ─────────────────────────────────────────────────────────────────────────────

message NetworkCreateRequest {
  // Network name — must match ploydok-* prefix.
  string name = 1;
  // Docker network driver (e.g. "bridge"). Defaults to "bridge" when empty.
  string driver = 2;
  // Optional labels.
  map<string, string> labels = 3;
  // Swarm overlay networks must be attachable so Caddy can join them.
  bool attachable = 4;
}

message NetworkCreateResponse {
  string network_id = 1;
}

message NetworkRemoveRequest {
  string network_id = 1;
}

message NetworkRemoveResponse {}

// Connect an existing container to an existing network.
// Idempotent: returns ALREADY_EXISTS if the container is already connected.
message NetworkConnectRequest {
  string network_id = 1;
  string container_id = 2;
  // Optional DNS aliases exposed on this network for the container.
  repeated string aliases = 3;
}

message NetworkConnectResponse {}

// Disconnect a container from a network.
// Idempotent: returns NOT_FOUND if either the container is not on the network
// or the network/container no longer exists.
message NetworkDisconnectRequest {
  string network_id = 1;
  string container_id = 2;
  // Force disconnect even if the container is running.
  bool force = 3;
}

message NetworkDisconnectResponse {}

// ─────────────────────────────────────────────────────────────────────────────
// Monitoring
// ─────────────────────────────────────────────────────────────────────────────

message ContainerSnapshot {
  string id = 1;
  string name = 2;
  string image = 3;
  string status = 4;                    // "running" | "starting" | "unhealthy" | "stopped" | "unknown"
  uint64 uptime_s = 5;                  // 0 if stopped
  double cpu_pct = 6;                   // 0-100, sampled
  uint64 mem_bytes = 7;
  uint64 mem_limit_bytes = 8;
  uint32 restart_count = 9;
  // Label "ploydok.kind" — "app" | "infra" | "agent" | "" (unknown)
  string kind = 10;
  // Label "ploydok.app_id" if kind=="app", empty otherwise
  string app_id = 11;
  // Label "ploydok.color" if kind=="app" — "blue"|"green"|""
  string color = 12;
  // Last active ping result (filled only after PingContainer called); 0 if never
  uint64 last_ping_ms = 13;
  bool   last_ping_ok = 14;
  // Unix millis of last seen
  uint64 last_seen_ms = 15;
}

message ListContainersRequest {
  // Optional: filter by label "ploydok.kind"
  string kind_filter = 1;
}

message ListContainersResponse {
  repeated ContainerSnapshot containers = 1;
}

message PingContainerRequest {
  string container_id = 1;
  // e.g. "/health" — mandatory, max 256 chars
  string path = 2;
  // Target port on the container (must match one of its exposed ports)
  uint32 port = 3;
  // Timeout in ms, capped at 5000 server-side
  uint32 timeout_ms = 4;
}

message PingContainerResponse {
  bool ok = 1;
  uint32 status_code = 2;               // 0 if transport error
  uint64 latency_ms = 3;
  string error = 4;                     // empty if ok
}

// Mirror of Docker's `State.Health.Status`. Used by InspectContainerHealth so
// the API can poll the daemon-maintained health state without doing a
// cross-network HTTP probe (the agent runs in its own docker-compose service
// and is not joined to per-project bridges).
enum ContainerHealthStatus {
  CONTAINER_HEALTH_STATUS_UNSPECIFIED = 0; // Reserved; never emitted.
  CONTAINER_HEALTH_STATUS_NONE        = 1; // No HEALTHCHECK declared on container.
  CONTAINER_HEALTH_STATUS_STARTING    = 2; // Within the start_period grace.
  CONTAINER_HEALTH_STATUS_HEALTHY     = 3;
  CONTAINER_HEALTH_STATUS_UNHEALTHY   = 4;
}

message InspectContainerHealthRequest {
  string container_id = 1;
}

message InspectContainerHealthResponse {
  ContainerHealthStatus status = 1;
  uint32 failing_streak = 2;            // Docker's failing_streak counter.
  string last_probe_output = 3;         // last health log entry, truncated server-side
  bool   container_missing = 4;         // true when inspect returns 404.
}

// ─────────────────────────────────────────────────────────────────────────────
// ContainerExec (bidirectional streaming)
// ─────────────────────────────────────────────────────────────────────────────

// Multiplexed frame for the ContainerExec bidi stream.
// Client sends: ExecStart (first), then stdin / resize frames.
// Server sends: ExecReady, then stdout / stderr / exit frames.
message ExecFrame {
  oneof payload {
    ExecStart  start  = 1;
    bytes      stdin  = 2;
    bytes      stdout = 3;
    bytes      stderr = 4;
    ExecResize resize = 5;
    ExecExit   exit   = 6;
    ExecReady  ready  = 7;
  }
}

// First frame sent by the client — initialises the exec session.
message ExecStart {
  // Container name or id — must match the ploydok-* allowlist.
  string container_id = 1;
  // Command to run inside the container (e.g. ["/bin/sh"]).
  repeated string cmd = 2;
  // Allocate a pseudo-TTY.
  bool tty = 3;
  // Initial terminal width in columns.
  uint32 cols = 4;
  // Initial terminal height in rows.
  uint32 rows = 5;
  // Run as this user (e.g. "1000:1000"). Empty → image default.
  string user = 6;
}

// Sent by the client to resize the terminal window.
message ExecResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

// Sent by the server when the exec'd process exits.
message ExecExit {
  int32 code = 1;
}

// Sent by the server once the exec session is ready (after create+start).
message ExecReady {
  // Docker exec id — useful for debugging / correlation.
  string exec_id = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// ListContainerFiles / ReadContainerFile (file browser sidebar)
// ─────────────────────────────────────────────────────────────────────────────

message ListContainerFilesRequest {
  // Container name or id — must match the ploydok-* allowlist.
  string container_id = 1;
  // Absolute path to list (must start with "/" — no "..").
  string path = 2;
  // Include dotfiles in the listing.
  bool show_hidden = 3;
}

message FileEntry {
  // Basename only (e.g. "foo.txt").
  string name = 1;
  // Absolute path inside the container.
  string path = 2;
  // True if entry is a directory.
  bool is_dir = 3;
  // True if entry is a symlink.
  bool is_symlink = 4;
  // Size in bytes (0 for directories).
  uint64 size = 5;
  // Permission bits as 4-digit octal string ("0755").
  string mode = 6;
  // Modification time, unix seconds.
  int64 mtime = 7;
  // Owner as "uid:gid" or "user:group".
  string owner = 8;
}

message ListContainerFilesResponse {
  // Resolved absolute path that was listed.
  string path = 1;
  repeated FileEntry entries = 2;
  // Empty if ok ; otherwise short reason ("not_a_directory", "not_found").
  string error = 3;
}

message ReadContainerFileRequest {
  // Container name or id — must match the ploydok-* allowlist.
  string container_id = 1;
  // Absolute path to read.
  string path = 2;
  // Maximum bytes to return. 0 = server default (256 KiB). Capped at 1 MiB.
  uint64 max_bytes = 3;
}

message ReadContainerFileResponse {
  // Raw bytes (truncated to max_bytes).
  bytes content = 1;
  // Total file size on disk (regardless of truncation).
  uint64 total_size = 2;
  // True if `content` was truncated.
  bool truncated = 3;
  // Heuristic: true if file looks like binary (contains NULs, etc.).
  bool is_binary = 4;
  // Empty if ok ; otherwise short reason.
  string error = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// DumpDatabase / RestoreDatabase
// ─────────────────────────────────────────────────────────────────────────────

message DumpRequest {
  // Container id or name of the database container.
  string container_id = 1;
  // "postgres" | "redis" | "mongo"
  string kind = 2;
  // age public-key recipient (e.g. "age1..."). Empty → no encryption.
  string age_recipient = 3;
}

// Each chunk carries raw dump bytes (possibly age-encrypted).
message DumpChunk {
  bytes data = 1;
}

message RestoreChunk {
  oneof payload {
    // First frame sent by the client — must arrive before any data frames.
    RestoreHeader header = 1;
    bytes data = 2;
  }
}

message RestoreHeader {
  string container_id = 1;
  string kind = 2;
  // age private-key identity used to decrypt the stream. Empty → plain stream.
  string age_identity = 3;
}

message RestoreResult {
  bool ok = 1;
  string error = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Host stats (Sprint 6.6 — VPS health monitoring)
// ─────────────────────────────────────────────────────────────────────────────

message HostStatsRequest {}

message HostStatsResponse {
  // CPU usage averaged on a short window (0.0 → 100.0).
  double cpu_percent = 1;
  uint64 mem_total_bytes = 2;
  uint64 mem_used_bytes = 3;
  uint64 mem_available_bytes = 4;
  uint64 swap_total_bytes = 5;
  uint64 swap_used_bytes = 6;
  // /proc/loadavg : 1m, 5m, 15m
  double load_1 = 7;
  double load_5 = 8;
  double load_15 = 9;
  // Disk usage on the root filesystem.
  uint64 disk_total_bytes = 10;
  uint64 disk_used_bytes = 11;
  uint64 disk_free_bytes = 12;
  // Inode usage on the root filesystem.
  uint64 inodes_total = 13;
  uint64 inodes_used = 14;
  uint32 cpu_count = 15;
  uint64 uptime_seconds = 16;
  // Optional error message if a partial read failed.
  string error = 17;
  // GPU (host aggregate, via nvidia-smi). gpu_count = 0 when no GPU / nvidia-smi absent.
  uint32 gpu_count = 18;
  double gpu_utilization_pct = 19;   // 0-100, averaged across GPUs
  uint64 gpu_mem_used_bytes = 20;
  uint64 gpu_mem_total_bytes = 21;
  string gpu_name = 22;              // first GPU's product name, empty if none
}

// ─────────────────────────────────────────────────────────────────────────────
// Disk usage & image reclaim (docker system df + image prune)
// ─────────────────────────────────────────────────────────────────────────────

message ImageDfRequest {}

// One resource category from `docker system df`.
message DiskUsageCategory {
  // "images" | "containers" | "volumes" | "build_cache"
  string kind = 1;
  int64 total_bytes = 2;
  int64 reclaimable_bytes = 3;
  int64 count = 4;
}

message ImageDfResponse {
  repeated DiskUsageCategory categories = 1;
  // Total on-disk size of all image layers.
  int64 layers_size_bytes = 2;
}

message ImagePruneRequest {
  // false → dangling (untagged) images only — the safe default.
  // true  → all unused images (still protected by keep_repo_tags below).
  bool all = 1;
  // Only remove images created strictly before this cutoff (unix seconds). 0 = no cutoff.
  int64 until_unix = 2;
  // Repo tags that must never be removed — the Ploydok reference-set guard
  // (running-container tag + last-good build tag). Honoured when all=true.
  repeated string keep_repo_tags = 3;
}

message ImagePruneResponse {
  int32 images_deleted = 1;
  int64 space_reclaimed_bytes = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Registry image digest (image auto-update watch)
// ─────────────────────────────────────────────────────────────────────────────

message RegistryImageDigestRequest {
  // Full image reference (e.g. "nginx:1.25" or "ghcr.io/org/app:latest").
  string image = 1;
  // Optional registry credentials for private images.
  RegistryAuth registry_auth = 2;
}

message RegistryImageDigestResponse {
  // Current manifest digest in the registry ("sha256:..."), empty if unknown.
  string digest = 1;
}

