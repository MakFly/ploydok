// ─────────────────────────────────────────────────────────────────────────────
// Audit log signing (Ed25519, key stored in agent OS keyring / file)
// ─────────────────────────────────────────────────────────────────────────────

// Sign a canonical audit-log payload with the agent's Ed25519 private key.
// The agent NEVER exposes the private key to the API.
message SignAuditEntryRequest {
  // Exactly the bytes the verifier (CLI) re-derives from the audit_log row.
  // Format v1: "v1\n<id>\n<created_at_iso>\n<user_id|->\n<action>\n<target_type>\n<target_id>\n<sha256_hex(metadata)>\n<prev_hash|->\n<hash>"
  bytes  canonical_payload = 1;
  // Empty = use current key. Caller can pin a kid for testing.
  string key_id = 2;
}

message SignAuditEntryResponse {
  // Ed25519 signature, raw 64 bytes (caller base64-encodes for storage).
  bytes  signature = 1;
  // Identifier of the key actually used (for rotation visibility).
  string key_id    = 2;
}

// Retrieve the agent's audit-log Ed25519 public key for offline verification.
message GetAuditPubkeyRequest {
  // Empty = current. Pinning a kid lets the CLI verify legacy entries.
  string key_id = 1;
}

message GetAuditPubkeyResponse {
  // Raw 32 bytes Ed25519 public key.
  bytes  pubkey = 1;
  string key_id = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Service definition
// ─────────────────────────────────────────────────────────────────────────────

service Agent {
  // Container lifecycle
  rpc ContainerCreate (ContainerCreateRequest)  returns (ContainerCreateResponse);
  rpc ContainerStart  (ContainerStartRequest)   returns (ContainerStartResponse);
  rpc ContainerStop   (ContainerStopRequest)    returns (ContainerStopResponse);
  rpc ContainerRemove (ContainerRemoveRequest)  returns (ContainerRemoveResponse);

  // Observability (streaming)
  rpc ContainerLogs   (ContainerLogsRequest)    returns (stream LogLine);
  rpc ContainerStats  (ContainerStatsRequest)   returns (stream StatsFrame);

  // Image management (streaming progress)
  rpc ImagePull       (ImagePullRequest)        returns (stream PullProgress);
  rpc ImageBuild      (ImageBuildRequest)       returns (stream BuildProgress);

  // Networking
  rpc NetworkCreate     (NetworkCreateRequest)      returns (NetworkCreateResponse);
  rpc NetworkRemove     (NetworkRemoveRequest)      returns (NetworkRemoveResponse);
  rpc NetworkConnect    (NetworkConnectRequest)     returns (NetworkConnectResponse);
  rpc NetworkDisconnect (NetworkDisconnectRequest)  returns (NetworkDisconnectResponse);

  // Monitoring (snapshot + ad-hoc ping)
  rpc ListContainers         (ListContainersRequest)         returns (ListContainersResponse);
  rpc PingContainer          (PingContainerRequest)          returns (PingContainerResponse);
  rpc InspectContainerHealth (InspectContainerHealthRequest) returns (InspectContainerHealthResponse);

  // Interactive shell (bidi streaming)
  rpc ContainerExec   (stream ExecFrame)        returns (stream ExecFrame);

  // File browser (read-only, used by the shell sidebar)
  rpc ListContainerFiles (ListContainerFilesRequest) returns (ListContainerFilesResponse);
  rpc ReadContainerFile  (ReadContainerFileRequest)  returns (ReadContainerFileResponse);

  // Database backup / restore (streaming)
  rpc DumpDatabase    (DumpRequest)             returns (stream DumpChunk);
  rpc RestoreDatabase (stream RestoreChunk)     returns (RestoreResult);

  // Host monitoring (VPS health — Sprint 6.6)
  rpc HostStats       (HostStatsRequest)        returns (HostStatsResponse);

  // Disk usage & image reclaim
  rpc ImageDf         (ImageDfRequest)          returns (ImageDfResponse);
  rpc ImagePrune      (ImagePruneRequest)       returns (ImagePruneResponse);

  // Registry image digest (auto-update watch)
  rpc RegistryImageDigest (RegistryImageDigestRequest) returns (RegistryImageDigestResponse);

  // Swarm runtime
  rpc SwarmInfo              (SwarmInfoRequest)              returns (SwarmInfoResponse);
  rpc SwarmEnsureSingleNode  (SwarmEnsureSingleNodeRequest)  returns (SwarmEnsureSingleNodeResponse);
  rpc ServiceCreate          (ServiceCreateRequest)          returns (ServiceCreateResponse);
  rpc ServiceUpdateImage     (ServiceUpdateImageRequest)     returns (ServiceUpdateImageResponse);
  rpc ServiceScale           (ServiceScaleRequest)           returns (ServiceScaleResponse);
  rpc ServiceRollback        (ServiceRollbackRequest)        returns (ServiceRollbackResponse);
  rpc ServiceRemove          (ServiceRemoveRequest)          returns (ServiceRemoveResponse);
  rpc ListServiceTasks       (ListServiceTasksRequest)       returns (ListServiceTasksResponse);

  // Audit log signing
  rpc SignAuditEntry  (SignAuditEntryRequest)  returns (SignAuditEntryResponse);
  rpc GetAuditPubkey  (GetAuditPubkeyRequest)  returns (GetAuditPubkeyResponse);
}
