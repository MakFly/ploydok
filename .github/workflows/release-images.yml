# SPDX-License-Identifier: AGPL-3.0-only
name: release-images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag/version pushed to ghcr (defaults to 0.0.1 on workflow_dispatch)"
        required: false
        default: "0.0.1"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  OWNER: makfly

jobs:
  build:
    name: build-${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ploydok-api
            dockerfile: apps/api/Dockerfile
            context: .
          - image: ploydok-agent
            dockerfile: agent/Dockerfile.prod
            context: .
          - image: ploydok-caddy
            dockerfile: infra/caddy/Dockerfile
            context: infra/caddy
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      # Signature keyless OIDC via Sigstore Fulcio. L'identité du signataire est
      # le run de ce workflow — l'installer la pinne via --certificate-identity-regexp.
      - name: Cosign sign (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
