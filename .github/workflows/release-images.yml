# SPDX-License-Identifier: AGPL-3.0-only
name: release-images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag/version pushed to ghcr (defaults to 0.0.1 on workflow_dispatch)"
        required: false
        default: "0.0.1"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  OWNER: makfly

jobs:
  build:
    name: build-${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ploydok-api
            dockerfile: apps/api/Dockerfile
            context: .
          - image: ploydok-web
            dockerfile: apps/web/Dockerfile
            context: .
          - image: ploydok-agent
            dockerfile: agent/Dockerfile.prod
            context: .
          - image: ploydok-caddy
            dockerfile: infra/caddy/Dockerfile
            context: infra/caddy
          - image: ploydok-adminer
            dockerfile: infra/adminer/Dockerfile
            context: infra/adminer
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version + tag list
        id: ver
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags=$'${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:'"${version}"$'\n${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest'
          elif [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF}" == refs/heads/main ]]; then
            version="main-${short_sha}"
            tags=$'${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:edge\n${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:'"${version}"
          else
            version="${{ inputs.version }}"
            tags=$'${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:'"${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.ver.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      # Signature keyless OIDC via Sigstore Fulcio. L'identité du signataire est
      # le run de ce workflow — l'installer la pinne via --certificate-identity-regexp.
      - name: Cosign sign (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
